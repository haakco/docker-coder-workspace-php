---
name: Publish Docker image
# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docker_build/**'
      - '.github/workflows/build_docker.yml'
    tags:
      - "v*"
  schedule:
    # Build order: docker-coder-workspace (20:30 Sun) → -playwright (21:15) → -php (21:30).
    # -php now FROM -playwright (not the bare base) so it must rebuild after -playwright.
    - cron: '30 21 * * 0'
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build_and_push:
    name: Build and push workspace-php image
    runs-on: self-hosted
    concurrency:
      group: "coder-workspace-php:${{ github.ref_name }}"
      cancel-in-progress: true
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/haakco/coder-workspace-php
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v0.') == false && startsWith(github.ref, 'refs/tags/v') }}
            type=edge,enable=true,branch=$repo.default_branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Clear stale Docker Hub credentials
        run: |
          # Runner pods mount docker-registry-credential which includes Docker Hub auth.
          # Bad Docker Hub creds block ALL public image pulls (docker/dockerfile, ubuntu, etc).
          # Remove Docker Hub entry so Docker falls back to anonymous access for public images.
          if [ -f ~/.docker/config.json ]; then
            python3 -c "
          import json, sys
          with open(sys.argv[1], 'r') as f: cfg = json.load(f)
          auths = cfg.get('auths', {})
          for key in list(auths.keys()):
              if 'docker.io' in key: del auths[key]
          with open(sys.argv[1], 'w') as f: json.dump(cfg, f, indent=2)
          " ~/.docker/config.json
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Build tag arguments from metadata output
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS --tag $tag"
          done <<< "$DOCKER_TAGS"

          docker buildx build \
            --pull \
            --push \
            --file ./docker_build/Dockerfile \
            --build-arg BASE_IMAGE_NAME=ghcr.io/haakco/coder-workspace-playwright \
            --build-arg BASE_IMAGE_VERSION=latest \
            $TAG_ARGS \
            .
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
